name: Kernel Build

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: kernel-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    container:
      image: ghcr.io/${{ github.repository_owner }}/kernel-builder:latest

    steps:
      - name: Clone E404 kernel
        run: |
          set -euo pipefail
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 600
          for attempt in 1 2 3; do
            echo "Clone attempt $attempt..."
            if git clone --depth=1 https://github.com/raz123/xiaomi_sm8250_kernel_ultimate.git /workspace/kernel; then
              echo "Clone succeeded"
              break
            fi
            rm -rf /workspace/kernel
            sleep 10
          done
          cd /workspace/kernel
          head -5 Makefile

      - name: Verify toolchain
        working-directory: /workspace/kernel
        run: |
          clang --version | head -2
          ld.lld --version
          aarch64-linux-gnu-gcc --version | head -1 || echo "WARNING: aarch64-linux-gnu-gcc not found"

      - name: Clone ReSukiSU KernelSU
        working-directory: /workspace/kernel
        run: |
          set -euo pipefail
          rm -rf drivers/kernelsu KernelSU
          git clone --depth=1 https://github.com/ReSukiSU/ReSukiSU /tmp/resukisu
          mkdir -p drivers/kernelsu
          cp -r /tmp/resukisu/kernel/* drivers/kernelsu/
          if [ -d /tmp/resukisu/uapi ]; then
            mkdir -p drivers/kernelsu/uapi
            cp -r /tmp/resukisu/uapi/* drivers/kernelsu/uapi/
          fi
          rm -rf /tmp/resukisu
          if [ -f drivers/kernelsu/Kbuild ]; then
            sed -i '/Can.*find.*submodule/d; /git submodule/d; /Stop\./d' drivers/kernelsu/Kbuild
          fi
          for check in drivers/kernelsu/tools/*_check.mk; do
            [ -f "$check" ] && echo "# Disabled for CI" > "$check"
          done
          echo "ReSukiSU integrated"

      - name: Patch defconfig for ReSukiSU
        working-directory: /workspace/kernel
        run: |
          set -euo pipefail
          DEFCONFIG="arch/arm64/configs/vendor/alioth_defconfig"
          sed -i '/CONFIG_KALLSYMS/d' "$DEFCONFIG"
          echo "CONFIG_KALLSYMS=y" >> "$DEFCONFIG"
          echo "CONFIG_KALLSYMS_ALL=y" >> "$DEFCONFIG"
          sed -i '/CONFIG_LTO/d; /CONFIG_LTO_CLANG/d; /CONFIG_HAS_LTO_CLANG/d; /CONFIG_ARCH_SUPPORTS_LTO/d' "$DEFCONFIG"
          echo "CONFIG_LTO_NONE=y" >> "$DEFCONFIG"

      - name: Fix camera techpack
        working-directory: /workspace/kernel
        run: |
          set -euo pipefail
          # Add cam_trace.o to cam_utils/Makefile
          UTILS_MK="techpack/camera/drivers/cam_utils/Makefile"
          if [ -f "$UTILS_MK" ] && ! grep -q 'cam_trace\.o' "$UTILS_MK"; then
            sed -i 's/cam_common_util\.o/cam_common_util.o cam_trace.o/' "$UTILS_MK"
            echo "Added cam_trace.o"
          fi
          # Add self-include path to cam_req_mgr/Makefile
          REQ_MGR_MK="techpack/camera/drivers/cam_req_mgr/Makefile"
          if [ -f "$REQ_MGR_MK" ]; then
            SELF_PATH="-I\$(srctree)/techpack/camera/drivers/cam_req_mgr/"
            if ! grep -qF 'cam_req_mgr/cam_req_mgr' "$REQ_MGR_MK" 2>/dev/null; then
              echo "ccflags-y += $SELF_PATH" >> "$REQ_MGR_MK"
              echo "Added self-include to cam_req_mgr/Makefile"
            fi
          fi

      - name: Build kernel
        working-directory: /workspace/kernel
        run: |
          set -euo pipefail
          make CC=clang LD=ld.lld ARCH=arm64 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               HOSTCC=gcc \
               LLVM=1 \
               vendor/alioth_defconfig
          make CC=clang LD=ld.lld ARCH=arm64 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               HOSTCC=gcc \
               LLVM=1 \
               -j4 2>&1 | tee build.log

      - name: Post-build checks
        working-directory: /workspace/kernel
        run: |
          file out/arch/arm64/boot/Image.gz-dtb
          ls -lh out/arch/arm64/boot/Image.gz-dtb

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image
          path: /workspace/kernel/out/arch/arm64/boot/Image.gz-dtb
          retention-days: 90

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /workspace/kernel/build.log
