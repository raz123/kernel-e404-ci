name: Kernel Build

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: kernel-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    container:
      image: ghcr.io/${{ github.repository_owner }}/kernel-builder:latest

    steps:
      - name: Clone E404 kernel
        run: |
          set -euo pipefail
          git config --global http.postBuffer 524288000
          for attempt in 1 2 3; do
            echo "Clone attempt $attempt..."
            if git clone --depth=1 https://github.com/raz123/xiaomi_sm8250_kernel_ultimate.git /workspace/kernel; then break; fi
            rm -rf /workspace/kernel; sleep 10
          done
          head -5 /workspace/kernel/Makefile

      - name: Verify toolchain
        working-directory: /workspace/kernel
        run: clang --version | head -2 && ld.lld --version

      - name: Clone KernelSU (rsuntk)
        working-directory: /workspace/kernel
        run: |
          set -euo pipefail
          rm -rf drivers/kernelsu KernelSU
          git clone --depth=1 https://github.com/rsuntk/KernelSU /tmp/kernelsu
          mkdir -p drivers/kernelsu
          cp -r /tmp/kernelsu/kernel/* drivers/kernelsu/
          [ -d /tmp/kernelsu/uapi ] && mkdir -p drivers/kernelsu/uapi && cp -r /tmp/kernelsu/uapi/* drivers/kernelsu/uapi/ || true
          rm -rf /tmp/kernelsu
          sed -i '/Can.*find.*submodule/d; /git submodule/d; /Stop\./d' drivers/kernelsu/Kbuild 2>/dev/null || true
          for f in drivers/kernelsu/tools/*_check.mk; do [ -f "$f" ] && echo "# Disabled" > "$f"; done
          echo "rsuntk/KernelSU integrated"

      - name: Patch defconfig
        working-directory: /workspace/kernel
        run: |
          set -euo pipefail
          DEF="arch/arm64/configs/vendor/alioth_defconfig"
          sed -i '/CONFIG_KALLSYMS/d' "$DEF"
          echo -e "CONFIG_KALLSYMS=y\nCONFIG_KALLSYMS_ALL=y" >> "$DEF"
          sed -i '/CONFIG_LTO/d' "$DEF"
          echo "CONFIG_LTO_NONE=y" >> "$DEF"

      - name: Fix camera techpack
        working-directory: /workspace/kernel
        run: |
          set -euo pipefail
          # Fix missing cam_trace.o in cam_utils/Makefile
          U="techpack/camera/drivers/cam_utils/Makefile"
          [ -f "$U" ] && ! grep -q cam_trace.o "$U" && sed -i 's/cam_common_util.o/cam_common_util.o cam_trace.o/' "$U"
          # Systematic fix: add self-include path to ALL camera subdirectory Makefiles
          # E404 is missing -I$(srctree)/techpack/camera/drivers/<subdir>/ in many Makefiles
          CAM_BASE="techpack/camera/drivers"
          for dir in $(find "$CAM_BASE" -mindepth 1 -maxdepth 1 -type d); do
            MK="$dir/Makefile"
            if [ -f "$MK" ]; then
              SELF="-I\$(srctree)/$dir/"
              if ! grep -qF "$dir/" "$MK" 2>/dev/null; then
                echo "ccflags-y += $SELF" >> "$MK"
              fi
            fi
          done
          # Also fix cam_sensor_module subdirectories
          for dir in $(find "$CAM_BASE/cam_sensor_module" -mindepth 1 -maxdepth 1 -type d 2>/dev/null); do
            MK="$dir/Makefile"
            if [ -f "$MK" ]; then
              SELF="-I\$(srctree)/$dir/"
              if ! grep -qF "$dir/" "$MK" 2>/dev/null; then
                echo "ccflags-y += $SELF" >> "$MK"
              fi
            fi
          done
          echo "Camera techpack fixed"

      - name: Build kernel
        working-directory: /workspace/kernel
        run: |
          set -euo pipefail
          make CC=clang LD=ld.lld ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- HOSTCC=gcc LLVM=1 vendor/alioth_defconfig
          make CC=clang LD=ld.lld ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- HOSTCC=gcc LLVM=1 -j4 2>&1 | tee build.log

      - name: Post-build checks
        working-directory: /workspace/kernel
        run: ls -lh arch/arm64/boot/Image.gz-dtb && wc -c arch/arm64/boot/Image.gz-dtb

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image
          path: /workspace/kernel/arch/arm64/boot/Image.gz-dtb
          retention-days: 90

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /workspace/kernel/build.log
